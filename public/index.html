<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1a2b" />
    <title>OKX Agentic Bot</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        --bg: #0c1a2b;
        --card: #13263f;
        --text: #dbe9f8;
        --muted: #9db9d8;
        --ok: #2dd4bf;
        --warn: #f59e0b;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --user-msg: #1e3a5f;
        --ai-msg: #1a2e4a;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 10% 20%, #16365b 0%, var(--bg) 55%);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      /* ─── Tab Navigation ─── */
      .tab-bar {
        display: flex;
        background: #0a1929;
        border-bottom: 1px solid #2a4d73;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .tab-btn {
        flex: 1;
        padding: 14px 16px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
      }
      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        background: rgba(59, 130, 246, 0.08);
      }

      /* ─── Panels ─── */
      .panel { display: none; flex: 1; }
      .panel.active { display: flex; flex-direction: column; }

      /* ─── Dashboard Panel ─── */
      #dashboard-panel { padding: 24px; align-items: center; justify-content: center; }

      .card {
        width: min(760px, 100%);
        background: linear-gradient(160deg, #17365b 0%, var(--card) 100%);
        border: 1px solid #2a4d73;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 28px; }
      .subtitle { margin: 0 0 20px; color: var(--muted); }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 8px 14px;
        background: #0f2138;
        border: 1px solid #274466;
      }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--warn); }
      .dot.ok { background: var(--ok); }
      .grid {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }
      .item {
        background: #102640;
        border: 1px solid #2a4d73;
        border-radius: 12px;
        padding: 14px;
      }
      .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
      .value { margin-top: 6px; word-break: break-word; }
      .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
      .actions button, .actions a {
        border: 1px solid #3a6290;
        background: #1a3e67;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 14px;
        text-decoration: none;
        cursor: pointer;
        font-size: 14px;
      }

      /* ─── Chat Panel ─── */
      #chat-panel { height: calc(100vh - 49px); }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.6;
        word-wrap: break-word;
        white-space: pre-wrap;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user-msg);
        border: 1px solid #2a5a8a;
        border-bottom-right-radius: 4px;
      }
      .msg.ai {
        align-self: flex-start;
        background: var(--ai-msg);
        border: 1px solid #243d5c;
        border-bottom-left-radius: 4px;
      }
      .msg.ai code {
        background: #0d1f33;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
      .msg.ai pre {
        background: #0d1f33;
        padding: 10px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 8px 0;
      }
      .msg.system {
        align-self: center;
        color: var(--muted);
        font-size: 12px;
        padding: 6px 12px;
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
      }
      .msg .timestamp {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
        opacity: 0.7;
      }

      .typing-indicator {
        display: none;
        align-self: flex-start;
        padding: 12px 16px;
        background: var(--ai-msg);
        border: 1px solid #243d5c;
        border-radius: 16px;
        border-bottom-left-radius: 4px;
      }
      .typing-indicator.show { display: flex; gap: 4px; }
      .typing-indicator span {
        width: 8px; height: 8px;
        background: var(--muted);
        border-radius: 50%;
        animation: bounce 1.4s infinite;
      }
      .typing-indicator span:nth-child(2) { animation-delay: 0.16s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.32s; }
      @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-8px); }
      }

      .chat-input-area {
        padding: 12px 16px;
        background: #0a1929;
        border-top: 1px solid #2a4d73;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .chat-input-area textarea {
        flex: 1;
        resize: none;
        background: #102640;
        border: 1px solid #2a4d73;
        border-radius: 12px;
        color: var(--text);
        padding: 12px 14px;
        font-size: 14px;
        font-family: inherit;
        line-height: 1.4;
        max-height: 120px;
        outline: none;
        transition: border-color 0.2s;
      }
      .chat-input-area textarea:focus { border-color: var(--accent); }
      .chat-input-area textarea::placeholder { color: var(--muted); }
      .send-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: none;
        background: var(--accent);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .send-btn:hover { background: var(--accent-hover); }
      .send-btn:disabled { opacity: 0.4; cursor: default; }
      .send-btn svg { width: 20px; height: 20px; }
    </style>
  </head>
  <body>
    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="chat">AI Chat</button>
    </nav>

    <!-- Dashboard Panel -->
    <div id="dashboard-panel" class="panel active">
      <main class="card">
        <h1>OKX Agentic Bot</h1>
        <p class="subtitle">Autostart + integration status dashboard</p>
        <div class="status" id="status">
          <span class="dot" id="dot"></span>
          <span id="statusText">Checking health...</span>
        </div>
        <section class="grid">
          <article class="item">
            <div class="label">Mode</div>
            <div class="value" id="mode">-</div>
          </article>
          <article class="item">
            <div class="label">Model</div>
            <div class="value" id="model">-</div>
          </article>
          <article class="item">
            <div class="label">API Endpoint</div>
            <div class="value">/api/bot/run</div>
          </article>
        </section>
        <div class="actions">
          <button id="refreshBtn">Refresh</button>
          <a href="/health" target="_blank" rel="noreferrer">Open /health</a>
        </div>
      </main>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" class="panel">
      <div class="chat-messages" id="chatMessages">
        <div class="msg system">LasbonAI Assistant — Tanya apapun tentang bot, portfolio, strategi trading.</div>
      </div>
      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>
      <div class="chat-input-area">
        <textarea id="chatInput" rows="1" placeholder="Ketik pertanyaan..." maxlength="4000"></textarea>
        <button class="send-btn" id="sendBtn" title="Kirim">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <script>
      // ─── Tab Switching ───
      const tabs = document.querySelectorAll(".tab-btn");
      const panels = document.querySelectorAll(".panel");
      tabs.forEach(btn => {
        btn.addEventListener("click", () => {
          tabs.forEach(t => t.classList.remove("active"));
          panels.forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(btn.dataset.tab + "-panel").classList.add("active");
          if (btn.dataset.tab === "chat") chatInput.focus();
        });
      });

      // ─── Dashboard ───
      async function loadHealth() {
        const dot = document.getElementById("dot");
        const statusText = document.getElementById("statusText");
        const mode = document.getElementById("mode");
        const model = document.getElementById("model");
        try {
          const res = await fetch("/health", { cache: "no-store" });
          const json = await res.json();
          if (json.ok) {
            dot.classList.add("ok");
            statusText.textContent = "Service healthy";
            mode.textContent = json.dryRun ? "dry-run" : "live";
            model.textContent = json.model || "unknown";
            return;
          }
          throw new Error("unhealthy");
        } catch {
          dot.classList.remove("ok");
          statusText.textContent = "Service not reachable";
          mode.textContent = "-";
          model.textContent = "-";
        }
      }
      document.getElementById("refreshBtn").addEventListener("click", loadHealth);

      // ─── Chat ───
      const chatMessages = document.getElementById("chatMessages");
      const chatInput = document.getElementById("chatInput");
      const sendBtn = document.getElementById("sendBtn");
      const typingIndicator = document.getElementById("typingIndicator");
      let chatHistory = [];
      let sending = false;

      function timeStr() {
        return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function appendMsg(role, text) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.innerHTML = formatMarkdown(text) + `<span class="timestamp">${timeStr()}</span>`;
        chatMessages.insertBefore(div, typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function formatMarkdown(text) {
        return text
          .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/^### (.+)$/gm, "<strong style='font-size:15px'>$1</strong>")
          .replace(/^## (.+)$/gm, "<strong style='font-size:16px'>$1</strong>")
          .replace(/^# (.+)$/gm, "<strong style='font-size:18px'>$1</strong>")
          .replace(/^- (.+)$/gm, "&bull; $1")
          .replace(/\n/g, "<br>");
      }

      async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || sending) return;

        sending = true;
        sendBtn.disabled = true;
        chatInput.value = "";
        chatInput.style.height = "auto";

        appendMsg("user", text);
        chatHistory.push({ role: "user", content: text });
        typingIndicator.classList.add("show");
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: chatHistory.slice(-18) })
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || "Request failed");

          typingIndicator.classList.remove("show");
          appendMsg("ai", data.reply);
          chatHistory.push({ role: "assistant", content: data.reply });

          // Keep history manageable
          if (chatHistory.length > 20) chatHistory = chatHistory.slice(-16);
        } catch (err) {
          typingIndicator.classList.remove("show");
          appendMsg("system", "Error: " + (err.message || "Gagal menghubungi AI"));
        } finally {
          sending = false;
          sendBtn.disabled = false;
          chatInput.focus();
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      chatInput.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      chatInput.addEventListener("input", () => {
        chatInput.style.height = "auto";
        chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
      });

      // ─── Service Worker ───
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }

      loadHealth();
    </script>
  </body>
</html>
