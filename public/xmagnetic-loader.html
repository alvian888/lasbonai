<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LasbonAI xMagnetic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 20px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.2rem; font-weight: 500; }
    .status { color: #8b949e; font-size: 0.85rem; }
    .ready { color: #3fb950; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>LasbonAI xMagnetic</h2>
  <div class="status" id="s">Initializing MetaMask...</div>
  <script>
    const URL = 'https://xmagnetic.org';
    let t = 3;
    setTimeout(() => {
      const mm = typeof window.ethereum !== 'undefined' && window.ethereum.isMetaMask;
      document.getElementById('s').textContent = mm
        ? '✅ MetaMask ready' : '⏳ MetaMask loading...';
      const tick = () => {
        if (t > 0) { document.getElementById('s').textContent += ` — ${t}s`; t--; setTimeout(tick, 1000); }
        else { window.location.href = URL; }
      };
      tick();
    }, 800);
  </script>
</body>
</html>
